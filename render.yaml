services:
  # Django API (backend)
  - type: web
    name: breathe-esg-api
    runtime: python
    plan: free
    buildCommand: pip install -r artifacts/api-server/requirements.txt
    startCommand: >
      cd artifacts/api-server &&
      python manage.py migrate --run-syncdb &&
      python manage.py seed_users &&
      python manage.py seed_demo_data &&
      gunicorn breathe_backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      # Optional (recommended for persistence): if you set this, Django will use Postgres.
      - key: DATABASE_URL
        sync: false


